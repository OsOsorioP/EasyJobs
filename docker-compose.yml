services:
  postgres:
    image: postgres:16-alpine
    container_name: easyjobs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: candidate_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_multiple_dbs.sh:/docker-entrypoint-initdb.d/init_multiple_dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: easyjobs-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  identity:
    build:
      context: ./services/identity
      dockerfile: Dockerfile
    container_name: easyjobs-identity
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/identity_db
    ports:
      - "8001:8001"
    volumes:
      - ./services/identity:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  candidate:
    build:
      context: ./services/candidate
      dockerfile: Dockerfile
    container_name: easyjobs-candidate
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/candidate_db
    ports:
      - "8000:8000"
    volumes:
      - ./services/candidate:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  intelligence:
    build:
      context: ./services/intelligence
      dockerfile: Dockerfile
    container_name: easyjobs-intelligence
    restart: unless-stopped
    env_file: .env
    environment:
      CANDIDATE_SERVICE_INTERNAL_URL: http://candidate:8000
      QDRANT_URL: http://qdrant:6333
    ports:
      - "8002:8002"
    volumes:
      - ./services/intelligence:/app
    depends_on:
      candidate:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  gateway:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    container_name: easyjobs-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      IDENTITY_SERVICE_URL: http://identity:8001
      CANDIDATE_SERVICE_URL: http://candidate:8000
      INTELLIGENCE_SERVICE_URL: http://intelligence:8002
    ports:
      - "8080:8080"
    volumes:
      - ./services/gateway:/app
    depends_on:
      identity:
        condition: service_healthy
      candidate:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data: